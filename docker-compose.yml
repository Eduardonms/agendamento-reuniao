services:
  mysql:
    image: mysql:8.4
    container_name: agendamento-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agendamento_reuniao
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: agendamento-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: prod
      DB_URL: jdbc:mysql://mysql:3306/agendamento_reuniao
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
